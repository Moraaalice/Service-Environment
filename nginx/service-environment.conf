server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Trace-ID $request_id;
    }

    access_log /var/log/nginx/service-environment.access.log;
    error_log /var/log/nginx/service-environment.error.log;
}
